
# A simple baseline configuration 
llm:
  models:
    default: gpt_oss120@openrouter
    fake: parrot_local@fake

    # ── Curated role-based tags ─────────────────────────────────────────────
    # Use these with --llm <tag> in any CLI command or profile config.
    # Ordered by cost: nano < fast < smart < coding < reasoning < vision < pro

    # Cheapest & fastest — quick classification, summaries, chat ($0.05/M in)
    nano_model: openai/gpt-5-nano@openrouter

    # Fast general-purpose — daily tasks, tool calling ($0.25/M in)
    fast_model: openai/gpt-5-mini@openrouter

    # Best quality/cost ratio — complex tasks, research, writing ($1.25/M in)
    smart_model: openai/gpt-5.1@openrouter

    # Coding specialist — code generation, debugging, refactoring ($1.25/M in)
    coding_model: openai/gpt-5.1-codex@openrouter

    # Deep reasoning / chain-of-thought — math, logic, planning ($1.10/M in)
    reasoning_model: openai/o4-mini@openrouter

    # Vision + multimodal — image analysis, charts, screenshots ($0.20/M in, 2M ctx)
    vision_model: x-ai/grok-4.1-fast@openrouter

    # Maximum capability — hardest problems, no cost constraint ($2.50/M in, 1M ctx)
    pro_model: openai/gpt-5.4@openrouter

    # ── Budget-friendly alternatives ────────────────────────────────────────
    # Free tier (rate-limited, good for dev/testing)
    free_model: openai/gpt-oss-120b:free@openrouter

    # Best open-weight reasoning ($0.28/M in)
    open_reasoning: deepseek/deepseek-v3.2@openrouter

    # Best open-weight coder ($0.30/M in, 262K ctx)
    open_coder: qwen/qwen3-coder@openrouter

    # Anthropic best ($3/M in, 1M ctx)
    claude: anthropic/claude-sonnet-4.6@openrouter

    # Google best ($0.30/M in, 1M ctx)
    gemini: google/gemini-3.1-flash-lite-preview@openrouter

  cache: sqlite
  cache_path: data/llm_cache/langchain.db

embeddings:
  models:
    default: ada_002@openai
    local: artic_22@ollama
    fake: embeddings_768@fake  # For testing
  cache: data/hf_models

# OLD configuration - still used by some code
vector_store:
  default: InMemory
  
embeddings_store:
  # Updated configuration using new field names (backend instead of id, storage instead of chroma_path)
 
  # default:
  #   backend: Chroma
  #   embeddings: default
  #   config:
  #     storage: ${paths.data_root}/vector_store  # Persistent storage on disk
  
  in_memory:
    backend: InMemory
  
  in_memory_chroma: &default_store  # Anchor is defined here first
    backend: Chroma
    embeddings: default
    table_name_prefix: embeddings
    config:
      storage: '::memory::'  # In-memory Chroma storage
  
  default: *default_store  # Now we can reference it
  
  chroma_indexed:
    backend: Chroma
    embeddings: default
    table_name_prefix: embeddings
    record_manager: sqlite:///${paths.data_root}/vector_store/record_manager_cache.sql
    config:
      storage: ${paths.data_root}/vector_store  # Persistent storage on disk
  
  zvec:
    backend: Zvec
    embeddings: default
    table_name_prefix: embeddings
    config:
      storage: ${paths.data_root}/zvec
      vector_field: embedding
      metric: COSINE
      optimize_on_add: true
   


# Key-Value Stores configuration
kv_store: 
  default:
    type: LocalFileStore
    path: ${paths.data_root}/kv_store
    
  postgres: 
    type: SQLStore
    path: postgresql://${oc.env:POSTGRES_USER,unknown_user}:${oc.env:POSTGRES_PASSWORD,password}@localhost:5432/ekg
  
# LLM Cache configuration  
llm_cache:
  method: "memory"  # Use memory cache for tests

chains:   # Old stuff. Will likely be removed
  root: tests.chains
  modules:
    - ${..root}.joke 

structured:
  default:
    baml_client: tests.baml_client

monitoring: 
  langsmith : true
  project: GenAI_demo
